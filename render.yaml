# Render.com FREE TIER Configuration - ZERO EXTERNAL DEPENDENCIES
# CUT GRC Platform - Free Tier Deployment
# Uses SQLite (no PostgreSQL/Redis required) - 100% free

# FREE TIER FEATURES:
# - 750 hours/month (enough for continuous operation)
# - SQLite database (persistent storage)
# - No external database required
# - Simple authentication
# - Basic GRC functionality

services:
  # Backend Service (100% Free Tier - No External Dependencies)
  - type: web
    name: cut-grc-free
    env: node
    region: frankfurt  # Best connectivity to Africa
    plan: free  # FREE TIER - NO PAYMENT REQUIRED
    buildCommand: cd src/backend && npm install --only=production
    startCommand: cd src/backend && node src/server-simple.js
    healthCheckPath: /health
    autoDeploy: true
    envVars:
      - key: NODE_ENV
        value: production
      - key: PORT
        value: 10000
      - key: CORS_ORIGIN
        value: "https://cut-grc-frontend.vercel.app,https://cut-grc-emergency.vercel.app,https://cut-grc-emergency-v2.vercel.app"  # SECURITY: Only allow specific origins
      - key: SQLITE_PATH
        value: /data/cut-grc.sqlite  # Persistent storage path

# NO EXTERNAL DATABASE REQUIRED!
# This configuration uses SQLite which is included with the application
# Data is stored in /data directory which persists across deployments

# Default Admin Credentials (created automatically):
# Email: admin@cut.ac.za
# Password: Admin123!

# API Endpoints Available:
# - GET /health - Health check
# - POST /api/v1/auth/login - Authentication
# - GET /api/v1/risks - List risks
# - POST /api/v1/risks - Create risk
# - GET /api/v1/users - List users
# - GET /api/v1/dashboard/stats - Dashboard statistics

# Deployment Instructions:
# 1. Click "Deploy" - NO PAYMENT REQUIRED
# 2. Wait for build to complete (~5 minutes)
# 3. Access your API at: https://cut-grc-free.onrender.com
# 4. Test with: https://cut-grc-free.onrender.com/health
# 5. Login with admin@cut.ac.za / Admin123!