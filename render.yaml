# Render.com Deployment Configuration
# African Sovereignty: Configured for optimal performance in African regions
# Simple configuration for free tier deployment

services:
  # Backend Service (Web Service)
  - type: web
    name: cut-grc-backend
    env: node
    region: frankfurt  # Frankfurt region for best African connectivity
    buildCommand: cd src/backend && npm install --only=production
    startCommand: cd src/backend && npm start
    healthCheckPath: /health
    autoDeploy: true
    envVars:
      - key: NODE_ENV
        value: production
      - key: PORT
        value: 10000
      - key: JWT_SECRET
        generateValue: true
      - key: CORS_ORIGIN
        value: "*"  # Allow all origins for development
      - key: API_PREFIX
        value: /api/v1
      - key: LOG_LEVEL
        value: info
      - key: AWS_REGION
        value: af-south-1

# Note: For free tier, add PostgreSQL and Redis manually via Render dashboard
# 1. Add PostgreSQL database from Render dashboard
# 2. Add Redis (Upstash Redis recommended for free tier)
# 3. Set DATABASE_URL and REDIS_URL environment variables manually

# Environment Variables to set manually in Render dashboard:
# DATABASE_URL=postgresql://username:password@host:port/database
# REDIS_URL=redis://username:password@host:port