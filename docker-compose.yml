# GRC Project Docker Compose
# African Sovereignty: Configured for African deployment with local services

version: '3.8'

services:
  # PostgreSQL Database
  postgres:
    image: postgres:15-alpine
    container_name: cut-grc-postgres
    restart: unless-stopped
    environment:
      POSTGRES_DB: cut_grc
      POSTGRES_USER: user
      POSTGRES_PASSWORD: password
      POSTGRES_INITDB_ARGS: "--encoding=UTF8 --lc-collate=C --lc-ctype=C"
    volumes:
      - postgres_data:/var/lib/postgresql/data
      - ./docker/postgres/init.sql:/docker-entrypoint-initdb.d/init.sql
    ports:
      - "5432:5432"
    networks:
      - grc-network
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U user -d cut_grc"]
      interval: 10s
      timeout: 5s
      retries: 5

  # Redis Cache
  redis:
    image: redis:7-alpine
    container_name: cut-grc-redis
    restart: unless-stopped
    command: redis-server --appendonly yes --requirepass redispassword
    volumes:
      - redis_data:/data
    ports:
      - "6379:6379"
    networks:
      - grc-network
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 10s
      timeout: 5s
      retries: 5

  # Backend Service
  backend:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: cut-grc-backend
    restart: unless-stopped
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
    environment:
      - NODE_ENV=development
      - PORT=3000
      - DATABASE_URL=postgresql://user:password@postgres:5432/cut_grc
      - REDIS_URL=redis://:redispassword@redis:6379
      - JWT_SECRET=development_jwt_secret_change_in_production
      - CORS_ORIGIN=http://localhost:5173
      - API_PREFIX=/api/v1
      - LOG_LEVEL=info
    volumes:
      - .:/app
      - /app/node_modules
    ports:
      - "3000:3000"
    networks:
      - grc-network
    develop:
      watch:
        - action: sync
          path: ./src
          target: /app/src
          ignore:
            - node_modules/

  # Frontend Service (Optional - Vite/React)
  frontend:
    image: node:20-alpine
    container_name: cut-grc-frontend
    restart: unless-stopped
    working_dir: /app
    volumes:
      - ./frontend:/app
      - /app/node_modules
    ports:
      - "5173:5173"
    networks:
      - grc-network
    command: sh -c "npm install && npm run dev"
    # Uncomment and create frontend directory if using frontend
    # depends_on:
    #   - backend

  # Adminer (Database Management - Optional)
  adminer:
    image: adminer
    container_name: cut-grc-adminer
    restart: unless-stopped
    ports:
      - "8080:8080"
    networks:
      - grc-network
    depends_on:
      - postgres

volumes:
  postgres_data:
    driver: local
  redis_data:
    driver: local

networks:
  grc-network:
    driver: bridge
    ipam:
      config:
        - subnet: 172.20.0.0/16