name: Test Suite

on:
  push:
    branches: [ main, develop ]
  pull_request:
    branches: [ main, develop ]
  schedule:
    # Run daily at 2 AM UTC
    - cron: '0 2 * * *'

jobs:
  test:
    runs-on: ubuntu-latest
    
    services:
      postgres:
        image: postgres:15
        env:
          POSTGRES_PASSWORD: postgres
          POSTGRES_DB: cut_grc_test
        options: >-
          --health-cmd pg_isready
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5
        ports:
          - 5432:5432
      
      redis:
        image: redis:7
        options: >-
          --health-cmd "redis-cli ping"
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5
        ports:
          - 6379:6379

    strategy:
      matrix:
        node-version: [20.x, 22.x]

    steps:
    - name: Checkout code
      uses: actions/checkout@v4

    - name: Setup Node.js ${{ matrix.node-version }}
      uses: actions/setup-node@v4
      with:
        node-version: ${{ matrix.node-version }}
        cache: 'npm'
        cache-dependency-path: '**/package-lock.json'

    - name: Install dependencies (Backend)
      working-directory: ./src/backend
      run: npm ci

    - name: Install dependencies (Frontend)
      working-directory: ./src/frontend
      run: npm ci

    - name: Wait for PostgreSQL
      run: |
        until pg_isready -h localhost -p 5432 -U postgres; do
          echo "Waiting for PostgreSQL..."
          sleep 2
        done

    - name: Wait for Redis
      run: |
        until redis-cli -h localhost ping | grep -q PONG; do
          echo "Waiting for Redis..."
          sleep 2
        done

    - name: Run linting (Backend)
      working-directory: ./src/backend
      run: npm run lint

    - name: Run type checking (Backend)
      working-directory: ./src/backend
      run: npm run type-check

    - name: Run unit tests (Backend)
      working-directory: ./src/backend
      env:
        NODE_ENV: test
        DB_HOST: localhost
        DB_PORT: 5432
        DB_NAME: cut_grc_test
        DB_USER: postgres
        DB_PASSWORD: postgres
        REDIS_URL: redis://localhost:6379
        JWT_SECRET: test-jwt-secret-32-chars-long-here-for-testing
        JWT_REFRESH_SECRET: test-refresh-secret-32-chars-long-here-for-testing
      run: npm test

    - name: Run integration tests (Backend)
      working-directory: ./src/backend
      env:
        NODE_ENV: test
        DB_HOST: localhost
        DB_PORT: 5432
        DB_NAME: cut_grc_test
        DB_USER: postgres
        DB_PASSWORD: postgres
        REDIS_URL: redis://localhost:6379
        JWT_SECRET: test-jwt-secret-32-chars-long-here-for-testing
        JWT_REFRESH_SECRET: test-refresh-secret-32-chars-long-here-for-testing
      run: npm run test:integration

    - name: Run coverage tests (Backend)
      working-directory: ./src/backend
      env:
        NODE_ENV: test
        DB_HOST: localhost
        DB_PORT: 5432
        DB_NAME: cut_grc_test
        DB_USER: postgres
        DB_PASSWORD: postgres
        REDIS_URL: redis://localhost:6379
        JWT_SECRET: test-jwt-secret-32-chars-long-here-for-testing
        JWT_REFRESH_SECRET: test-refresh-secret-32-chars-long-here-for-testing
      run: npm run test:coverage

    - name: Upload coverage to Codecov
      uses: codecov/codecov-action@v3
      with:
        directory: ./src/backend/coverage
        flags: backend
        name: codecov-umbrella

    - name: Run security audit
      working-directory: ./src/backend
      run: npm audit --audit-level=high

    - name: Run linting (Frontend)
      working-directory: ./src/frontend
      run: npm run lint

    - name: Run type checking (Frontend)
      working-directory: ./src/frontend
      run: npm run type-check

    - name: Run unit tests (Frontend)
      working-directory: ./src/frontend
      run: npm test

    - name: Run E2E tests (if configured)
      working-directory: ./src/frontend
      run: |
        if [ -f "cypress.config.ts" ]; then
          npm run test:e2e
        else
          echo "E2E tests not configured"
        fi

    - name: Build application
      working-directory: ./src/backend
      run: npm run build

  docker-build:
    runs-on: ubuntu-latest
    needs: test
    if: github.event_name == 'push' && github.ref == 'refs/heads/main'
    
    steps:
    - name: Checkout code
      uses: actions/checkout@v4

    - name: Set up Docker Buildx
      uses: docker/setup-buildx-action@v3

    - name: Login to DockerHub
      uses: docker/login-action@v3
      with:
        username: ${{ secrets.DOCKER_USERNAME }}
        password: ${{ secrets.DOCKER_PASSWORD }}

    - name: Build and push backend image
      uses: docker/build-push-action@v5
      with:
        context: ./src/backend
        push: true
        tags: |
          ${{ secrets.DOCKER_USERNAME }}/cut-grc-backend:latest
          ${{ secrets.DOCKER_USERNAME }}/cut-grc-backend:${{ github.sha }}
        cache-from: type=gha
        cache-to: type=gha,mode=max

    - name: Build and push frontend image
      uses: docker/build-push-action@v5
      with:
        context: ./src/frontend
        push: true
        tags: |
          ${{ secrets.DOCKER_USERNAME }}/cut-grc-frontend:latest
          ${{ secrets.DOCKER_USERNAME }}/cut-grc-frontend:${{ github.sha }}
        cache-from: type=gha
        cache-to: type=gha,mode=max

  deploy-staging:
    runs-on: ubuntu-latest
    needs: [test, docker-build]
    if: github.event_name == 'push' && github.ref == 'refs/heads/develop'
    
    steps:
    - name: Checkout code
      uses: actions/checkout@v4

    - name: Deploy to Staging
      run: |
        echo "Deploying to staging environment..."
        # Add your staging deployment commands here
        # Example: kubectl apply -f k8s/staging/
        # Example: ssh deploy@staging-server "cd /app && docker-compose pull && docker-compose up -d"

  deploy-production:
    runs-on: ubuntu-latest
    needs: [test, docker-build]
    if: github.event_name == 'push' && github.ref == 'refs/heads/main'
    
    steps:
    - name: Checkout code
      uses: actions/checkout@v4

    - name: Deploy to Production
      run: |
        echo "Deploying to production environment..."
        # Add your production deployment commands here
        # Example: kubectl apply -f k8s/production/
        # Example: ssh deploy@production-server "cd /app && docker-compose pull && docker-compose up -d"